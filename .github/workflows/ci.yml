name: Pipeline CI - Tests Automaticos

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  correr-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Correr los tests
        run: npm test
